<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PT Live Design — Venture Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
 --ink:#16140f;--paper:#f4efe2;--paper2:#ece5d3;--card:#fbf8ef;--hair:#d4cdb9;
 --red:#d6402c;--blue:#1f4ed8;--yellow:#f2b705;--green:#1f9d55;--muted:#6f6857;
 --acc:#1f4ed8;--sel:rgba(31,78,216,.10);
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:'Archivo',system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.45;
 background-image:linear-gradient(var(--hair) 1px,transparent 1px),linear-gradient(90deg,var(--hair) 1px,transparent 1px);
 background-size:34px 34px;background-position:-1px -1px;padding-bottom:90px}
.mono{font-family:'Space Mono',monospace}
.wrap{max-width:1300px;margin:0 auto;padding:18px 16px}
/* header */
header{border:3px solid var(--ink);background:var(--paper);margin-bottom:16px;overflow:hidden}
.hbar{display:flex;align-items:stretch}
.hmark{width:54px;border-right:3px solid var(--ink);background:var(--yellow);position:relative;flex:none}
.hmark::before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 50% 30%,var(--red) 0 17%,transparent 17%),linear-gradient(var(--blue) 0 0) bottom/100% 33% no-repeat}
.htitle{flex:1;padding:12px 16px}
.htitle h1{font-family:'Archivo Black';font-size:clamp(18px,3vw,28px);line-height:.95;text-transform:uppercase;letter-spacing:-.5px}
.htitle .sub{font-family:'Space Mono';font-size:10px;letter-spacing:1px;color:var(--muted);margin-top:5px;text-transform:uppercase}
.hbtns{display:flex;gap:0;border-left:3px solid var(--ink);flex:none}
.hbtns button{border:none;border-right:1px solid var(--hair);background:var(--paper2);font-family:'Space Mono';font-size:10px;font-weight:700;padding:0 12px;cursor:pointer;text-transform:uppercase;letter-spacing:.5px}
.hbtns button:last-child{border-right:none}
.hbtns button:hover{background:var(--ink);color:var(--paper)}
/* nav */
nav{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.nav-btn{font-family:'Space Mono';font-size:12px;font-weight:700;border:2px solid var(--ink);background:var(--paper);padding:8px 14px;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;transition:.12s}
.nav-btn:hover{transform:translate(-1px,-1px);box-shadow:2px 2px 0 var(--ink)}
.nav-btn.on{background:var(--ink);color:var(--paper)}
.view{display:none}.view.on{display:block}
/* generic card */
.card{border:3px solid var(--ink);background:var(--card);margin-bottom:14px}
.card-h{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:3px solid var(--ink);background:var(--paper2)}
.cdot{width:14px;height:14px;border:2px solid var(--ink);flex:none}
.card-h h3{font-family:'Archivo Black';font-size:13px;text-transform:uppercase}
.card-h .code{font-family:'Space Mono';font-size:11px;color:var(--muted);font-weight:700}
.card-b{padding:12px}
.badge{font-family:'Space Mono';font-size:9px;font-weight:700;letter-spacing:.3px;padding:2px 6px;border:1.5px solid var(--ink);text-transform:uppercase;white-space:nowrap;display:inline-block}
.b-own{background:var(--paper)}.b-dep{background:#fff;border-style:dashed;color:var(--muted)}
.b-code{background:var(--blue);color:#fff;border-color:var(--blue)}
a.b-gh{background:var(--ink);color:var(--paper);text-decoration:none}a.b-gh:hover{background:var(--red);border-color:var(--red)}
.pill{font-family:'Space Mono';font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;text-transform:uppercase;letter-spacing:.3px;border:1.5px solid var(--ink)}
.muted{color:var(--muted)}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
/* status dot */
.sdot{width:9px;height:9px;border-radius:50%;border:1.5px solid var(--ink);flex:none;background:#fff}
.sdot.live{background:var(--green)}.sdot.prog{background:var(--yellow)}.sdot.proto{background:var(--blue)}
.sdot.concept{background:#fff}.sdot.input{background:var(--red)}.sdot.tbc{background:#bbb}.sdot.done{background:var(--ink)}
/* TODAY view */
.hero{border:3px solid var(--ink);background:#16140f;color:#f4efe2;padding:16px;margin-bottom:16px;position:relative;overflow:hidden}
.hero .lab{font-family:'Space Mono';font-size:10px;letter-spacing:2px;color:var(--yellow);text-transform:uppercase}
.hero h2{font-family:'Archivo Black';font-size:clamp(20px,3.6vw,30px);line-height:1.02;margin:6px 0 8px;text-transform:uppercase}
.hero .meta{font-family:'Space Mono';font-size:11px;color:#cfc8b6}
.hero .act{margin-top:12px}
.btn{font-family:'Space Mono';font-size:11px;font-weight:700;border:2px solid var(--ink);background:var(--paper);color:var(--ink);padding:7px 12px;cursor:pointer;text-transform:uppercase;letter-spacing:.4px;transition:.12s}
.btn:hover{transform:translate(-1px,-1px);box-shadow:2px 2px 0 rgba(0,0,0,.4)}
.btn.y{background:var(--yellow)}.btn.r{background:var(--red);color:#fff;border-color:var(--red)}.btn.b{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn.ghost{background:transparent;color:var(--paper);border-color:var(--paper)}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px}
.tcard{border:3px solid var(--ink);background:var(--card);display:flex;flex-direction:column}
.tcard .top{display:flex;align-items:center;gap:7px;padding:8px 10px;border-bottom:2px solid var(--ink)}
.tcard .top .code{font-family:'Space Mono';font-size:10px;font-weight:700;color:var(--muted)}
.tcard .top .nm{font-family:'Archivo Black';font-size:12px;text-transform:uppercase;letter-spacing:-.2px}
.tcard .cold{margin-left:auto;font-family:'Space Mono';font-size:8px;font-weight:700;background:var(--red);color:#fff;padding:1px 5px;text-transform:uppercase}
.tcard .body{padding:10px;flex:1}
.tcard .nxlab{font-family:'Space Mono';font-size:9px;letter-spacing:1px;color:var(--red);text-transform:uppercase;font-weight:700}
.tcard .nx{font-size:14px;font-weight:700;line-height:1.25;margin:3px 0 6px}
.tcard .small{font-size:12px;color:var(--muted);font-style:italic;border-left:3px solid var(--yellow);padding-left:8px;margin-bottom:8px}
.tcard .foot{display:flex;align-items:center;gap:6px;padding:8px 10px;border-top:2px solid var(--hair);flex-wrap:wrap}
.streak{font-family:'Space Mono';font-size:10px;font-weight:700}
.mini{font-family:'Space Mono';font-size:9px;font-weight:700;border:1.5px solid var(--ink);background:var(--paper);padding:3px 6px;cursor:pointer;text-transform:uppercase}
.mini:hover{background:var(--ink);color:var(--paper)}
.mini.ai{background:var(--yellow)}
/* GANTT */
.board{border:3px solid var(--ink);background:var(--paper);overflow-x:auto}
.gantt{min-width:1000px;position:relative}
.grow{display:grid;grid-template-columns:330px repeat(12,1fr);border-bottom:1px solid var(--hair)}
.ghead{position:sticky;top:0;z-index:6;background:var(--ink)}
.ghead .c{color:var(--paper);font-family:'Space Mono';font-size:10px;font-weight:700;padding:9px 5px;text-align:center;border-left:1px solid #3a362c}
.ghead .lbl{position:sticky;left:0;z-index:7;background:var(--ink);text-align:left;padding-left:12px;border-left:none}
.qy{font-size:8px;opacity:.5;display:block}
.gsec .band{grid-column:1/-1;display:flex;align-items:center;gap:9px;padding:7px 12px;border-top:3px solid var(--ink);border-bottom:2px solid var(--ink);cursor:pointer;position:sticky;left:0}
.band h2{font-family:'Archivo Black';font-size:12px;text-transform:uppercase}
.band .tag{font-family:'Space Mono';font-size:9px;color:var(--muted)}
.band .rd{margin-left:auto;font-family:'Space Mono';font-size:10px;font-weight:700}
.lbl{position:sticky;left:0;z-index:4;background:var(--card);border-right:3px solid var(--ink);padding:7px 9px 7px 20px;display:flex;flex-direction:column;gap:4px;justify-content:center;cursor:pointer}
.grow:nth-child(even) .lbl{background:var(--paper2)}
.tnm{font-size:12px;font-weight:600;line-height:1.2}
.track{grid-column:2/-1;display:grid;grid-template-columns:repeat(12,1fr);position:relative}
.track .gc{border-left:1px solid var(--hair);min-height:42px}
.bar{position:absolute;top:8px;height:24px;z-index:2;border:2px solid var(--ink);display:flex;align-items:center;gap:4px;padding:0 6px;font-family:'Space Mono';font-size:9px;font-weight:700;white-space:nowrap;overflow:hidden;cursor:pointer;box-shadow:2px 2px 0 rgba(0,0,0,.16)}
.bar.hatch{background-image:repeating-linear-gradient(45deg,transparent 0 4px,rgba(0,0,0,.14) 4px 6px)}
.bar.done{opacity:.5;text-decoration:line-through}
.hidden{display:none!important}
/* BOARD */
.kanban{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:10px}
.kcol{border:3px solid var(--ink);background:var(--paper)}
.kcol h4{font-family:'Space Mono';font-size:11px;font-weight:700;text-transform:uppercase;padding:8px 10px;border-bottom:3px solid var(--ink);background:var(--paper2);display:flex;justify-content:space-between}
.kcol .kb{padding:8px;display:flex;flex-direction:column;gap:7px;min-height:60px}
.ktask{border:2px solid var(--ink);background:var(--card);padding:7px 8px;cursor:pointer}
.ktask .kc{font-family:'Space Mono';font-size:9px;color:var(--muted);font-weight:700}
.ktask .kn{font-size:12px;font-weight:600;line-height:1.2;margin-top:2px}
.ktask:hover{box-shadow:2px 2px 0 var(--ink);transform:translate(-1px,-1px)}
/* DASHBOARD */
.dgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
.dcard{border:3px solid var(--ink);background:var(--card);padding:12px;display:flex;flex-direction:column;gap:8px}
.ring{display:flex;align-items:center;gap:12px}
.ring svg{flex:none}
.ring .rv{font-family:'Archivo Black';font-size:22px;line-height:1}
.ring .rl{font-family:'Space Mono';font-size:9px;color:var(--muted);text-transform:uppercase}
.dmeta{font-family:'Space Mono';font-size:10px;color:var(--muted);line-height:1.7}
.dn{font-family:'Archivo Black';font-size:13px;text-transform:uppercase;line-height:1}
/* icons */
.picon{display:inline-flex;vertical-align:middle;flex:none}
.picon svg{display:block}
/* repo button */
.repo{font-family:'Space Mono';font-size:9px;font-weight:700;border:1.5px solid var(--ink);background:var(--ink);color:var(--paper);padding:3px 7px;text-decoration:none;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.repo:hover{background:var(--red);border-color:var(--red)}
/* filters */
.fbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;border:3px solid var(--ink);background:var(--paper);padding:9px 11px;margin-bottom:12px}
.fbar .fl{font-family:'Space Mono';font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.fbar select,.fbar input{border:2px solid var(--ink);background:var(--card);font-family:'Space Mono';font-size:11px;padding:5px 7px;font-weight:700}
.fbar input[type=text]{min-width:120px}
.fbar .clear{cursor:pointer;font-family:'Space Mono';font-size:10px;font-weight:700;border:2px solid var(--ink);background:var(--yellow);padding:5px 9px;text-transform:uppercase}
/* momentum list */
.mom{border:3px solid var(--ink);background:var(--card);margin-bottom:16px}
.mom-h{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:3px solid var(--ink);background:var(--yellow)}
.mom-h h3{font-family:'Archivo Black';font-size:13px;text-transform:uppercase}
.mom-h .sub{font-family:'Space Mono';font-size:9px;margin-left:auto;text-transform:uppercase}
.mrow{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px dotted var(--hair)}
.mrow:last-child{border-bottom:none}
.mrow:hover{background:var(--paper2)}
.mrow .mc{font-family:'Space Mono';font-size:9px;font-weight:700;color:var(--muted);white-space:nowrap}
.mrow .mtxt{flex:1;font-size:14px;font-weight:700;line-height:1.25}
.mrow .mtxt small{display:block;font-family:'Space Mono';font-size:9px;font-weight:400;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:1px}
.mrow .mstreak{font-family:'Space Mono';font-size:11px;font-weight:700;white-space:nowrap}
.mrow .mbtn{font-family:'Space Mono';font-size:9px;font-weight:700;border:1.5px solid var(--ink);background:var(--paper);padding:4px 7px;cursor:pointer;text-transform:uppercase;white-space:nowrap}
.mrow .mbtn:hover{background:var(--ink);color:var(--paper)}
.mrow .mbtn.ai{background:var(--yellow)}
.mrow .mbtn.done{background:var(--green);color:#fff;border-color:var(--green)}
/* dependency overlay */
#gwrap{position:relative}
svg.deplines{position:absolute;top:0;left:0;pointer-events:none;z-index:1;overflow:visible}
.linkchip{font-family:'Space Mono';font-size:8px;font-weight:700;color:var(--muted)}
/* icon picker */
.ipick{display:flex;flex-wrap:wrap;gap:5px}
.ipick .ip{border:2px solid var(--hair);background:var(--card);padding:5px;cursor:pointer;border-radius:2px}
.ipick .ip.on{border-color:var(--ink);background:var(--paper2)}
.linkbadge{font-family:'Space Mono';font-size:8px;font-weight:700;border:1.5px solid var(--blue);color:var(--blue);background:#fff;padding:1px 5px;text-decoration:none}
.linkbadge:hover{background:var(--blue);color:#fff}
/* ---------- DARK MODE ---------- */
body.dark{--ink:#ffffff;--paper:#071513;--paper2:#0c1d1a;--card:#0b1a18;--hair:#1d3a36;--muted:#8fc4bb;--acc:#34f5d8;--sel:rgba(52,245,216,.14);
 background:radial-gradient(1200px 700px at 70% -10%,#0e2622 0%,#071513 55%,#050f0e 100%);background-attachment:fixed}
body.dark .sdot{background:var(--card)}
body.dark .sdot.concept{background:var(--card)}
body.dark .b-dep{background:var(--card)}
body.dark .convention,body.dark .fbar,body.dark .legend{background:var(--paper2)}
body.dark .nav-btn.on{background:var(--acc);color:#04211d;border-color:var(--acc);box-shadow:0 0 0 1px var(--acc),0 0 14px rgba(52,245,216,.35)}
body.dark .nav-btn{color:var(--ink)}
body.dark .caret{color:var(--acc)}
body.dark .trow.flash .lbl{animation:flashd 1.6s ease}
@keyframes flashd{0%,100%{background:var(--card)}30%{background:rgba(52,245,216,.30)}}
body.dark .band,body.dark .cohead{background:linear-gradient(180deg,#0e2420,#0b1a18)}
body.dark .trow:hover .lbl,body.dark .ti:hover{background:var(--sel)}
body.dark .pbar{border-color:var(--acc)}
body.dark .repo{border-color:var(--acc);color:var(--acc)}
body.dark .hero{background:linear-gradient(135deg,#0f2723,#0a1816);border-color:var(--acc)}
body.dark .bar.sel,body.dark .trow.sel .lbl{outline:2px solid var(--acc)}
.picon svg{color:var(--ink)}
.rtrack{stroke:var(--hair)}
svg.deplines{color:var(--ink)}
.themebtn{border:none;border-right:1px solid var(--hair);background:var(--paper2);font-family:'Space Mono';font-size:10px;font-weight:700;padding:0 12px;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;color:var(--ink)}
.themebtn:hover{background:var(--ink);color:var(--paper)}
/* present-moment subhead */
.nowhead{font-family:'Space Mono';font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin:0 0 10px 2px}
/* gantt collapse controls */
.gctrls{display:flex;gap:8px;align-items:center;margin-bottom:10px}
.caret{font-family:'Space Mono';font-size:12px;font-weight:700;width:14px;display:inline-block}
.bandsum{font-family:'Space Mono';font-size:9px;color:var(--muted);margin-left:8px}
/* ---------- TEAM & OPPORTUNITIES ---------- */
.crmgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.crmcard{border:3px solid var(--ink);background:var(--card)}
.crmcard .ch{display:flex;align-items:center;gap:8px;padding:9px 11px;border-bottom:3px solid var(--ink);background:var(--paper2)}
.crmcard .ch .cn{font-family:'Archivo Black';font-size:12px;text-transform:uppercase}
.crmcard .ch .cc{font-family:'Space Mono';font-size:10px;color:var(--muted);font-weight:700}
.crmcard .cb{padding:10px 11px}
.seclab{font-family:'Space Mono';font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin:4px 0 6px;display:flex;align-items:center;gap:6px}
.seclab .add{margin-left:auto;cursor:pointer;border:1.5px solid var(--ink);background:var(--paper);padding:2px 6px;font-size:9px;font-weight:700;color:var(--ink)}
.seclab .add:hover{background:var(--ink);color:var(--paper)}
.tchip{display:inline-flex;align-items:center;gap:6px;border:2px solid var(--ink);background:var(--paper);padding:4px 8px;margin:0 5px 5px 0;font-size:12px;cursor:pointer}
.tchip .tr{font-family:'Space Mono';font-size:9px;color:var(--muted)}
.tchip:hover{background:var(--paper2)}
.opp{border:2px solid var(--ink);background:var(--paper);padding:7px 9px;margin-bottom:6px;cursor:pointer}
.opp:hover{background:var(--paper2)}
.opp .ot{font-size:13px;font-weight:700;line-height:1.2}
.opp .om{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap}
.opp .on{font-size:11px;color:var(--muted);margin-top:3px}
.kind{font-family:'Space Mono';font-size:8px;font-weight:700;border:1.5px solid var(--ink);padding:1px 5px;text-transform:uppercase}
.spill{font-family:'Space Mono';font-size:8px;font-weight:700;padding:1px 6px;border:1.5px solid var(--ink);text-transform:uppercase}
.spill.Lead{background:var(--paper)}
.spill.Applied{background:var(--yellow)}
.spill.Active{background:var(--blue);color:#fff;border-color:var(--blue)}
.spill.Won{background:var(--green);color:#fff;border-color:var(--green)}
.spill.Lost{background:var(--red);color:#fff;border-color:var(--red)}
.crmempty{font-size:11px;color:var(--muted);font-style:italic;padding:2px 0 6px}
/* ---------- IDENTITY + SAVE STATE (header) ---------- */
.idpill{display:flex;align-items:center;border-left:3px solid var(--ink)}
.idpill button{border:none;background:var(--paper2);font-family:'Space Mono';font-size:10px;font-weight:700;padding:0 12px;height:100%;cursor:pointer;text-transform:uppercase;letter-spacing:.5px;color:var(--ink)}
.idpill button:hover{background:var(--ink);color:var(--paper)}
.savedot{font-family:'Space Mono';font-size:9px;color:var(--muted);padding:0 10px;display:flex;align-items:center;gap:5px;border-left:1px solid var(--hair)}
.savedot b{color:var(--green)}
/* ---------- TIMER BAR (fixed bottom) ---------- */
.timebar{position:fixed;left:0;right:0;bottom:0;height:54px;background:var(--ink);color:var(--paper);display:flex;align-items:center;gap:12px;padding:0 14px;z-index:40;border-top:3px solid var(--yellow)}
.timebar .live{font-family:'Space Mono';font-size:20px;font-weight:700;letter-spacing:1px}
.timebar .ctx{font-family:'Space Mono';font-size:11px;color:#cfc8b6;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.timebar .val{font-family:'Archivo Black';font-size:16px;color:var(--yellow)}
.pulse{width:11px;height:11px;border-radius:50%;background:var(--red);flex:none;animation:pl 1.1s infinite}
@keyframes pl{0%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}100%{opacity:1;transform:scale(1)}}
.tbtn{font-family:'Space Mono';font-size:11px;font-weight:700;border:2px solid var(--paper);background:transparent;color:var(--paper);padding:7px 12px;cursor:pointer;text-transform:uppercase;letter-spacing:.4px;flex:none}
.tbtn:hover{background:var(--paper);color:var(--ink)}
.tbtn.in{background:var(--yellow);color:var(--ink);border-color:var(--yellow)}
.tbtn.out{background:var(--red);color:#fff;border-color:var(--red)}
/* ---------- TIME VIEW ---------- */
.tsum{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.tsum .s{border:3px solid var(--ink);background:var(--card);padding:11px}
.tsum .s .v{font-family:'Archivo Black';font-size:22px;line-height:1}
.tsum .s .l{font-family:'Space Mono';font-size:9px;text-transform:uppercase;color:var(--muted);margin-top:3px;letter-spacing:.5px}
.ratecard{border:3px solid var(--ink);background:var(--card);margin-bottom:14px}
.ratecard .rr{display:flex;align-items:center;gap:8px;padding:6px 11px;border-bottom:1px dotted var(--hair)}
.ratecard .rr input.sk{flex:1;border:1.5px solid var(--hair);background:var(--paper);padding:5px 7px;font-family:'Archivo';font-size:13px}
.ratecard .rr input.rt{width:90px;border:1.5px solid var(--hair);background:var(--paper);padding:5px 7px;font-family:'Space Mono';font-size:13px;font-weight:700}
.ratecard .rr .gbp{font-family:'Space Mono';font-weight:700}
.proj-roll{width:100%;border-collapse:collapse}
.proj-roll td,.proj-roll th{padding:7px 9px;border-bottom:1px solid var(--hair);font-size:12px;text-align:left}
.proj-roll th{font-family:'Space Mono';font-size:9px;text-transform:uppercase;background:var(--ink);color:var(--paper)}

function monthIndex(ds){ if(!ds) return 11; const d=new Date(ds); let i=(d.getFullYear()-2026)*12+(d.getMonth()-5); return Math.max(0,Math.min(11,i)); }
function daysSince(ds){ if(!ds) return 999; return Math.floor((Date.now()-new Date(ds))/86400000); }

function findTask(code){ for(const p of STATE.projects){ const t=p.tasks.find(x=>x.code===code); if(t)return t; } return null; }
function findProj(code){ return STATE.projects.find(p=>p.code===code); }
function projOfTask(code){ return STATE.projects.find(p=>p.tasks.some(t=>t.code===code)); }
function nextTask(p){ return p.tasks.find(t=>t.status!=="Done"&&t.status!=="Scope TBC") || p.tasks.find(t=>t.status!=="Done"); }
function completion(p){ const tot=p.tasks.length||1; const done=p.tasks.filter(t=>t.status==="Done").length; return Math.round(done/tot*100); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('on'); setTimeout(()=>t.classList.remove('on'),2200); }

function priorityScore(p){
 const statusW={"Needs input":100,"In progress":80,"Live":70,"Prototype":60,"Concept":40,"Done":10,"Scope TBC":5};
 const ds=daysSince(p.touched); const cold=ds>14;
 let score=(statusW[p.status]||30);
 score+=Math.min((p.streak||0)*3,30);
 score+=Math.round((p.readiness||0)*0.3);
 if(cold) score+=(p.status==="In progress"||p.status==="Live")?25:10;
 const t=nextTask(p); if(t&&t.deadline){ const d=new Date(t.deadline); const diff=(d-new Date())/864e5; if(diff<14&&diff>=0) score+=20; if(diff<0) score+=35; }
 return score;
}

function drawDepLines(){
 const gantt=document.getElementById('gantt'); const svg=document.getElementById('deplines'); if(!gantt||!svg)return;
 const g=gantt.getBoundingClientRect();
 svg.style.width=gantt.scrollWidth+'px'; svg.style.height=gantt.scrollHeight+'px';
 let paths="";
 STATE.projects.forEach(p=>{
   p.tasks.forEach(t=>{
     (t.deps||[]).forEach(dc=>{
       if(!dc.startsWith(p.code))return;
       const a=document.querySelector(`[data-bar="${dc}"]`), b=document.querySelector(`[data-bar="${t.code}"]`);
       if(!a||!b)return; const ar=a.getBoundingClientRect(), br=b.getBoundingClientRect();
       if(ar.width===0||br.width===0)return;
       const xP=ar.right-g.left, yP=ar.top-g.top+ar.height/2;   // predecessor right-edge mid
       const xS=br.left-g.left,  yS=br.top-g.top+br.height/2;   // successor left-edge mid
       const barH=ar.height, stub=9;
       let d;
       if(xS-14 > xP){ // successor clearly to the right: single vertical channel just left of it
         const cx=xS-12; d=`M${xP} ${yP} H${cx} V${yS} H${xS}`;
       } else { // same column / overlap: route through the gutter beneath the predecessor row
         const gx=xP+stub, ymid=yP+barH/2+6, lx=Math.max(2,xS-12);
         d=`M${xP} ${yP} H${gx} V${ymid} H${lx} V${yS} H${xS}`;
       }
       paths+=`<path d="${d}" fill="none" stroke="${p.color}" stroke-width="1.7" stroke-dasharray="4 2" opacity="0.9"/>`;
       paths+=`<circle cx="${xP}" cy="${yP}" r="2.8" fill="${p.color}" stroke="currentColor" stroke-width="1"/>`;
       paths+=`<path d="M${xS-6} ${yS-4} L${xS} ${yS} L${xS-6} ${yS+4} Z" fill="${p.color}" stroke="${p.color}"/>`;
     });
   });
 });
 svg.innerHTML=paths;
}

 // micro tasks (subtasks): incomplete go into parent's column, done go into Done

 });

}

/* ---------- TIME TRACKING + BILLING ---------- */
function rateOf(skill){ const r=(STATE.rates||[]).find(x=>x.skill===skill); return r?r.rate:0; }
function entryMins(e){ if(e.mins!=null&&e.end)return e.mins; const end=e.end?new Date(e.end):new Date(); return Math.max(0,Math.round((end-new Date(e.start))/60000)); }
function entryValue(e){ return entryMins(e)/60*rateOf(e.skill); }
function activeEntry(){ return (STATE.time||[]).find(e=>!e.end); }
function fmtHM(mins){ const h=Math.floor(mins/60),m=mins%60; return `${h}h ${String(m).padStart(2,'0')}m`; }
function fmtClock(secs){ const h=Math.floor(secs/3600),m=Math.floor(secs%3600/60),s=Math.floor(secs%60); return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; }
function gbp(n){ return "£"+(Math.round(n*100)/100).toLocaleString('en-GB',{minimumFractionDigits:2,maximumFractionDigits:2}); }

 } else {
   bar.innerHTML=`<span class="pulse" style="background:#5a564a;animation:none"></span><span class="ctx">No timer running.</span><button class="tbtn in" onclick="clockInModal()">▶ Clock in</button>`;
 }
}

function renderTime(){
 const T=STATE.time||[];
 const totMins=T.reduce((s,e)=>s+entryMins(e),0);
 const totVal=T.reduce((s,e)=>s+(e.billable===false?0:entryValue(e)),0);
 const now=new Date(); const wkStart=new Date(now); wkStart.setDate(now.getDate()-((now.getDay()+6)%7)); wkStart.setHours(0,0,0,0);
 const wk=T.filter(e=>new Date(e.start)>=wkStart); const wkMins=wk.reduce((s,e)=>s+entryMins(e),0); const wkVal=wk.reduce((s,e)=>s+(e.billable===false?0:entryValue(e)),0);
 let h=`<div class="nowhead">Time & billing · log hours, set your rate by skill, estimate what to invoice</div>`;
 h+=`<div class="tsum">
   <div class="s"><div class="v">${fmtHM(totMins)}</div><div class="l">total tracked</div></div>
   <div class="s"><div class="v">${gbp(totVal)}</div><div class="l">billable value</div></div>
   <div class="s"><div class="v">${fmtHM(wkMins)}</div><div class="l">this week</div></div>

function copy(txt){ try{navigator.clipboard.writeText(txt);}catch(e){ const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');}catch(_){}ta.remove(); } }

async function aiSuggest(code){
 const p=findProj(code); if(!p)return; toast("✦ Asking Claude…");
 const tlist=p.tasks.map(t=>`${t.code} ${t.name} [${t.status}]`).join("; ");
 const prompt=`You are advising Pete, acting as both a top-level software engineer and a Chief Commercial Officer. Project: "${p.name}" — ${p.one}. Current tasks: ${tlist}. Their current smallest action is: "${p.smallest}". Suggest ONE new, even smaller, concrete physical next action doable in under 15 minutes that moves the venture toward shipping or revenue. Weigh both technical leverage and commercial value. Reply with ONLY the action sentence, under 20 words, no preamble, no em dashes.`;
 try{
   const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
   const d=await r.json(); const txt=(d.content||[]).filter(x=>x.type==="text").map(x=>x.text).join(" ").trim();
   if(txt){ p.smallest=txt.replace(/^["']|["']$/g,""); toast("✦ New smallest action set"); render(); } else throw new Error("empty");
 }catch(e){ const t=nextTask(p); p.smallest=t&&t.subs&&t.subs.length?`Do just the first step: ${t.subs[0].n}.`:(t?`Open ${t.code} and spend 10 minutes only on: ${t.name}.`:"Pick any task and name its first 10-minute step."); toast("Offline — set a heuristic action"); render(); }
}

   else h+=`<div class="crmempty">No one tied yet.</div>`;
   h+=`<div class="seclab" style="margin-top:10px">Opportunities <span class="add" onclick="openOpp('${p.code}',-1)">+ Opportunity</span></div>`;
   if(c.opps.length){ c.opps.forEach((o,i)=>{ h+=`<div class="opp" onclick="openOpp('${p.code}',${i})"><div class="ot">${o.title}</div><div class="om"><span class="kind">${o.kind}</span><span class="spill ${o.status}">${o.status}</span></div>${o.note?`<div class="on">${o.note}</div>`:''}</div>`; }); }
   else h+=`<div class="crmempty">No opportunities logged.</div>`;
   h+=`</div>`; }
   h+=`</div>`;
 });
 h+=`</div>`;
 return h;
}
function openPerson(code,idx){ const c=crmOf(code); const m=idx>=0?c.team[idx]:{name:"",role:""};
 openScrim(`<div class="modal-h"><h3>${idx>=0?'Edit person':'Add person'} · ${code}</h3><span class="x" onclick="closeModal()">✕</span></div><div class="modal-b">
  <div class="fld"><label>Name</label><input id="pe-name" value="${esc(m.name)}"></div>
  <div class="fld"><label>Role / relationship</label><input id="pe-role" value="${esc(m.role||'')}" placeholder="mentor, build, client lead…"></div>
 </div><div class="modal-f"><button class="btn r" onclick="savePerson('${code}',${idx})">Save</button>${idx>=0?`<button class="btn" onclick="delPerson('${code}',${idx})">Delete</button>`:''}</div>`); }
function savePerson(code,idx){ const c=crmOf(code); const o={name:val('pe-name'),role:val('pe-role')}; if(!o.name.trim())return toast("Name needed"); if(idx>=0)c.team[idx]=o; else c.team.push(o); closeModal(); toast("Saved"); render(); }
function delPerson(code,idx){ crmOf(code).team.splice(idx,1); closeModal(); render(); }
function openOpp(code,idx){ const c=crmOf(code); const o=idx>=0?c.opps[idx]:{title:"",kind:"Partner",status:"Lead",note:""};
 const opts=(arr,sel)=>arr.map(x=>`<option ${x===sel?'selected':''}>${x}</option>`).join("");
 openScrim(`<div class="modal-h"><h3>${idx>=0?'Edit opportunity':'Add opportunity'} · ${code}</h3><span class="x" onclick="closeModal()">✕</span></div><div class="modal-b">
  <div class="fld"><label>Title</label><input id="op-title" value="${esc(o.title)}"></div>
  <div class="fld two"><div><label>Kind</label><select id="op-kind">${opts(STATE.oppKinds,o.kind)}</select></div><div><label>Status</label><select id="op-status">${opts(STATE.oppStatuses,o.status)}</select></div></div>
  <div class="fld"><label>Note</label><input id="op-note" value="${esc(o.note||'')}"></div>
 </div><div class="modal-f"><button class="btn r" onclick="saveOpp('${code}',${idx})">Save</button>${idx>=0?`<button class="btn" onclick="delOpp('${code}',${idx})">Delete</button>`:''}</div>`); }
function saveOpp(code,idx){ const c=crmOf(code); const o={title:val('op-title'),kind:val('op-kind'),status:val('op-status'),note:val('op-note')}; if(!o.title.trim())return toast("Title needed"); if(idx>=0)c.opps[idx]=o; else c.opps.push(o); closeModal(); toast("Saved"); render(); }
function delOpp(code,idx){ crmOf(code).opps.splice(idx,1); closeModal(); render(); }

/* ---------- TIME ACTIONS ---------- */
function uid(){ return 't'+Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function clockInModal(){
 const a=activeEntry(); if(a)return toast("Already clocked in — clock out first");
 const popts=STATE.projects.map(p=>`<option value="${p.code}">${p.code} ${p.name}</option>`).join("");
 const sopts=(STATE.rates||[]).map(r=>`<option>${r.skill}</option>`).join("");
 openScrim(`<div class="modal-h"><span class="pulse"></span><h3>Clock in</h3><span class="x" onclick="closeModal()">✕</span></div><div class="modal-b">
   <div class="fld"><label>Venture</label><select id="ci-proj">${popts}</select></div>
   <div class="fld"><label>Skill deployed (sets the rate)</label><select id="ci-skill">${sopts}</select></div>
   <div class="fld"><label>Note (optional)</label><input id="ci-note" placeholder="what are you doing"></div>
 </div><div class="modal-f"><button class="btn r" onclick="clockIn()">▶ Start timer</button></div>`);
}
function clockIn(){ STATE.time=STATE.time||[]; STATE.time.push({id:uid(),proj:val('ci-proj'),skill:val('ci-skill'),start:new Date().toISOString(),end:null,note:val('ci-note'),who:STATE.me,billable:true}); const p=findProj(val('ci-proj')); if(p){if(p.touched!==today())p.streak=(p.streak||0)+1;p.touched=today();} closeModal(); toast("⏱ Clocked in"); render(); }
function clockOut(){ const e=activeEntry(); if(!e)return; e.end=new Date().toISOString(); e.mins=entryMins(e); toast(`■ Logged ${fmtHM(e.mins)} · ${gbp(entryValue(e))}`); render(); }

function timeModal(e){ const isNew=!e; e=e||{proj:STATE.projects[0].code,skill:(STATE.rates[0]||{}).skill,start:new Date().toISOString(),end:new Date().toISOString(),note:"",who:STATE.me,billable:true};
 const popts=STATE.projects.map(p=>`<option value="${p.code}" ${p.code===e.proj?'selected':''}>${p.code} ${p.name}</option>`).join("");
 const sopts=(STATE.rates||[]).map(r=>`<option ${r.skill===e.skill?'selected':''}>${r.skill}</option>`).join("");
 const dt=s=>s?new Date(s).toISOString().slice(0,16):"";
 openScrim(`<div class="modal-h"><h3>${isNew?'Log time':'Edit entry'}</h3><span class="x" onclick="closeModal()">✕</span></div><div class="modal-b">
   <div class="fld"><label>Venture</label><select id="t-proj">${popts}</select></div>
   <div class="fld"><label>Skill deployed</label><select id="t-skill">${sopts}</select></div>
   <div class="fld two"><div><label>Start</label><input type="datetime-local" id="t-start" value="${dt(e.start)}"></div><div><label>End</label><input type="datetime-local" id="t-end" value="${dt(e.end)}"></div></div>
   <div class="fld"><label>Note</label><input id="t-note" value="${esc(e.note||'')}"></div>
   <div class="fld"><label><input type="checkbox" id="t-bill" ${e.billable!==false?'checked':''}> Billable</label></div>
 </div><div class="modal-f"><button class="btn r" onclick="saveTime('${isNew?'':e.id}')">Save</button>${isNew?'':`<button class="btn" onclick="delTime('${e.id}')">Delete</button>`}</div>`);
}
function addTimeModal(){ timeModal(null); }
function editTime(id){ timeModal((STATE.time||[]).find(e=>e.id===id)); }
function saveTime(id){ const start=new Date(val('t-start')).toISOString(); const end=val('t-end')?new Date(val('t-end')).toISOString():null; const o={proj:val('t-proj'),skill:val('t-skill'),start,end,note:val('t-note'),who:STATE.me,billable:document.getElementById('t-bill').checked}; if(end)o.mins=Math.max(0,Math.round((new Date(end)-new Date(start))/60000));
 if(id){ const e=STATE.time.find(x=>x.id===id); Object.assign(e,o); } else { o.id=uid(); STATE.time=STATE.time||[]; STATE.time.push(o); }
 closeModal(); toast("Saved entry"); render(); }
function delTime(id){ STATE.time=STATE.time.filter(e=>e.id!==id); closeModal(); toast("Deleted"); render(); }

/* ---------- RATE CARD ---------- */
function setRate(i,k,v){ STATE.rates[i][k]= k==='rate'?(parseFloat(v)||0):v; saveState(); if(VIEW==="time")render(); }
function addRate(){ STATE.rates.push({skill:"New skill",rate:75}); render(); }
function delRate(i){ STATE.rates.splice(i,1); render(); }

/* ---------- IDENTITY ---------- */
function changeMe(){ const team=STATE.team||["Pete"];
 openScrim(`<div class="modal-h"><h3>Who is logging?</h3><span class="x" onclick="closeModal()">✕</span></div><div class="modal-b">
   <div class="fld"><label>Your name (tags your time + edits, ready for your hires)</label><input id="me-name" value="${esc(STATE.me)}"></div>
   <div class="fld"><label>Team roster (comma-separated)</label><input id="me-team" value="${esc(team.join(', '))}"></div>
   <div class="convention" style="margin:0">When your hires join, add them here and they pick their name. True multi-user sync arrives when you connect the Supabase backend (see the deploy notes).</div>
 </div><div class="modal-f"><button class="btn r" onclick="saveMe()">Save</button></div>`);
}
function saveMe(){ STATE.me=val('me-name').trim()||"Pete"; STATE.team=val('me-team').split(',').map(s=>s.trim()).filter(Boolean); const b=document.getElementById('idbtn'); if(b)b.textContent="You: "+STATE.me; closeModal(); toast("Identity set"); render(); }

/* ---------- THEME (persisted) ---------- */
function toggleTheme(){ DARK=!DARK; STATE.dark=DARK; applyTheme(); saveState(); if(VIEW==="gantt")requestAnimationFrame(drawDepLines); }
function applyTheme(){ document.body.classList.toggle('dark',DARK); const b=document.getElementById('themebtn'); if(b)b.textContent=DARK?'◑ Light':'◐ Dark'; }

/* ---------- BOOT ---------- */
if(!STATE.crm)STATE.crm={}; if(!STATE.time)STATE.time=[]; if(!STATE.plans)STATE.plans={}; if(!STATE.companies)STATE.companies=structuredClone(SEED.companies); if(!STATE.rates)STATE.rates=structuredClone(SEED.rates); if(!STATE.me)STATE.me="Pete"; if(!STATE.team)STATE.team=["Pete"];
DARK=!!STATE.dark; applyTheme();
const idb=document.getElementById('idbtn'); if(idb)idb.textContent="You: "+STATE.me;
const sd=document.getElementById('savedot'); if(sd)sd.textContent=STORE_OK?'autosaving':'memory only';
initSchedule(); renderNav(); render();
setInterval(tickTimer,1000);
</script>
</body></html>
